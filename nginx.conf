server {
    listen 80;
    server_name _;

    # RFC 9728 protected resource metadata for Robinhood.
    # This path lives at the domain root (NOT under /robinhood/), so it needs
    # its own location before the /robinhood/ catch-all. No prefix stripping —
    # forward the full /.well-known/oauth-protected-resource/... path to backend.
    location /.well-known/oauth-protected-resource/ {
        proxy_pass http://mcp:8000/.well-known/oauth-protected-resource/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Robinhood MCP + OAuth endpoints.
    # Tailscale routes /robinhood → port 80 here; nginx strips the /robinhood
    # prefix so FastMCP sees /mcp, /authorize, /token, /register, etc.
    location /robinhood/ {
        proxy_pass http://mcp:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Needed for SSE / long-poll MCP transport
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # All other traffic goes to the Obsidian MCP server on the Docker host.
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
